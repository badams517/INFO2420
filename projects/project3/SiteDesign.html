<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Site Design</title>
    <style>
      body {
        background-color: #AA71A7;
        color: #ffffff;
        font-family: Georgia, serif;
        font-size: 100%;
        padding-top: 180px;
      }

      header {
        background-color: #6B4E90;
        color: white;
        padding: 1rem;
        text-align: center;
        width: 100%;
        position: fixed;
        top: 0;
        left: 0;
        z-index: 20;
      }

      header h1 {
        color: white;
        margin: 0.25rem 0;
      }

      .logo {
        height: 64px;
        width: 64px;
      }

      .button {
        background-color: #554E00;
  
        text-decoration: none;
        display: inline-block;
        padding: 0.5rem 1rem;
      }

      .button:hover {
        background-color: #D4CB64;

      }

      h1 {
        font-family: Century, serif;
        font-variant: small-caps;
        text-align: center;
      }

      h2,
      h3 {
        font-family: Century, serif;
        font-variant: small-caps;
        text-align: left;
        margin: 1rem 2rem;
      }

      .color-refs {
        display: flex;
        flex-wrap: wrap;
        gap: 1rem;
        margin: 1rem 2rem;
      }

      .color-refs img {
        max-width: 600px;
        width: 100%;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Site Design</h1>
    </header>

    <h2>Color Reference</h2>
    <div class="color-refs">
      <img src="./images/1color.png" alt="1 Color">
      <img src="./images/3colors.png" alt="3 Colors">
      <img src="./images/Tretrad.png" alt="Tetrad">
      <img src="./images/Triad3Color.png" alt="Triad 3 Color">
      <img src="./images/freestyle.png" alt="Freestyle">
    </div>

  </body>
</html>
