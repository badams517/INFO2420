<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>HTML Practice 6B - Tables</title>

<style type="text/css">
@font-face {
  font-family: 'Darkh4';
  src: url('../../fonts/Darkh4.ttf');
  src: local('Darkh4'), url('../../fonts/Darkh4.ttf') format('truetype');
}
.center {
  text-align: center;
}
table, th, td {
  border: 1px solid black;
  border-collapse: collapse;
  padding: 8px;
}
caption {
   font-family: 'Darkh4';
   color: #1d2f20;
   font-weight: bold;
   background-color: #D7E7D0;
   border-radius: 10px;
   border: 2px solid #1d2f20;
   height: 40px;
   text-align: center;
   font-size: 40px;
}

.courses {
   background-color: #ccc;
   width: 25%;
}

th.days {
   background-color: #99ff66;
   width: 15%;
}
td { 
   color: #1d2f20;
   background-color: #ccffcc;
   font-size: 20px;
   }

th {
   border: 2px solid #1d2f20;
   padding: 5px;
   border-radius: 5px;
   font-size: 20px;
}


</style>
</head>

<body>
<div class="center">
  <table>
    <caption>My Class Schedule</caption>
    <colgroup class="courses"></colgroup>
    <colgroup class="days"></colgroup>

    <tr>
      <th>Courses</th>
      <th class="days">Monday</th>
      <th class="days">Tuesday</th>
      <th class="days">Wednesday</th>
      <th class="days">Thursday</th>
      <th class="days">Friday</th>
    </tr>
    <tr>
      <th>INFO 2420</th>
      <td colspan="5">Online Available 24/7</td>
    </tr>
    <tr>
      <th>INFO 3300</th>
      <td colspan="5">Online Available 24/7</td>
    </tr>
    <tr>
      <th>FIN 4570R</th>
      <td colspan="5">Online Available 24/7</td>
    </tr>
  </table>
</div>

</body>
</html>
